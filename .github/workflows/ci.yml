name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-scripts:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: find . -name '*.sh' -exec bash -n {} +

      - name: Check PowerShell syntax
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem -Recurse -Include *.ps1,*.psm1 | ForEach-Object {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$null, [ref]$errors)
            if ($errors.Count -gt 0) {
              Write-Error "$($_.Name): $($errors[0].Message)"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

  cmake-configure:
    name: CMake configure (CUDA container)
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.6.3-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: |
          apt-get update && apt-get install -y cmake

      - name: Configure CMake
        run: |
          # CMAKE_CUDA_COMPILER_WORKS=1 skips the try_compile compiler check,
          # which would fail in this GPU-less container. This is fine for a
          # configure-only smoke test. If you add 'cmake --build' later, remove
          # this flag and use a container/runner with GPU support.
          cmake -B build -S cuda-cmake \
            -DCMAKE_CUDA_ARCHITECTURES=89 \
            -DCMAKE_CUDA_COMPILER_WORKS=1
